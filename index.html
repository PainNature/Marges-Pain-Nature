<section>
    <h2>Réglages & Rentabilité</h2>
    <div class="result-box">
        <div class="grid-2">
            <div>
                <label>Marge visée (%)</label>
                <input type="number" id="cfg-marge" value="75" oninput="calculerRecette()">
            </div>
            <div>
                <label>Coeff. multiplicateur</label>
                <input type="number" id="cfg-coeff" value="4.3" step="0.1" oninput="calculerRecette()">
            </div>
        </div>
        <div class="grid-2" style="margin-top:10px">
            <div><label>Poids Cru (g)</label><input type="number" id="poids-cru" readonly></div>
            <div><label>Poids Cuit (g)</label><input type="number" id="poids-cuit" oninput="calculerRecette()"></div>
        </div>
        <div style="margin-top:10px">
            <label>TVA (%)</label>
            <select id="cfg-tva" onchange="calculerRecette()">
                <option value="1.055">5.5% (Pain / Vienn.)</option>
                <option value="1.10">10% (Snacking / Traiteur)</option>
                <option value="1.20">20% (Alcool / Luxe)</option>
            </select>
        </div>
    </div>
    
    <div class="grid-2" style="margin-top:15px">
        <div class="method-box" id="box-marge">
            <div class="best-badge">OPTIMAL</div>
            <small id="label-marge">PV Marge (75%)</small>
            <h2 id="res-marge">0.00 €</h2>
        </div>
        <div class="method-box" id="box-coeff">
            <div class="best-badge">OPTIMAL</div>
            <small id="label-coeff">PV Coeff (x4.3)</small>
            <h2 id="res-coeff">0.00 €</h2>
        </div>
    </div>
    <button class="btn btn-cloud" style="width:100%; margin-top:20px; height: 50px; font-size: 1.1em;" onclick="archiverRecette()">💾 Archiver & Sauvegarder Cloud</button>
</section>
