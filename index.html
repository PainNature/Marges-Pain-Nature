<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boulangerie Pro - V23.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #d35400; --secondary: #2c3e50; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        
        /* Navigation */
        .nav-tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 2px solid #bdc3c7; overflow-x: auto; }
        .tab-btn { padding: 10px 15px; border: none; background: #95a5a6; color: white; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); }
        
        /* Contenu */
        .container { background: white; padding: 20px; border-radius: 0 5px 5px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .section-box { border: 1px solid #e1e1e1; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #fafafa; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        .btn { padding: 10px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; margin: 2px; }
        .chk-grid { display: grid; grid-template-columns: 1fr 1fr; font-size: 0.70em; gap: 1px; }
        .result-card { background: #34495e; color: white; padding: 15px; border-radius: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" id="btn-mp" onclick="changeTab('mp')">Matière première</button>
    <button class="tab-btn" id="btn-labo" onclick="changeTab('labo')">Labo</button>
    <button class="tab-btn" id="btn-boulange" onclick="changeTab('boulange')">Boulangerie</button>
    <button class="tab-btn" id="btn-patis" onclick="changeTab('patis')">Pâtisserie</button>
    <button class="tab-btn" id="btn-viennoiseries" onclick="changeTab('viennoiseries')">Viennoiserie</button>
    <button class="tab-btn" id="btn-voyage" onclick="changeTab('voyage')">Gat. Voyages</button>
    <button class="tab-btn" id="btn-historique" onclick="changeTab('historique')">Historique</button>
</div>

<div class="container">
    <div id="tab-mp" class="tab-content active">
        <div class="section-box">
            <h3>☁️ Gestion du Cloud & Historique</h3>
            <p id="sync-status"><strong>Statut :</strong> Prêt</p>
            <button class="btn" style="background:#2980b9" onclick="sync()">🔄 Synchroniser</button>
            <button class="btn" style="background:var(--success)" onclick="exportJSON()">💾 Exporter JSON</button>
            <button class="btn" style="background:var(--secondary)" onclick="document.getElementById('file-in').click()">📂 Importer</button>
            <input type="file" id="file-in" style="display:none" onchange="importJSON(event)">
            <button class="btn" style="background:#d35400" onclick="savePriceHistory()">📈 Enregistrer prix pour Historique</button>
        </div>
        <table><thead><tr><th>Métiers</th><th>Fournisseur</th><th>Produit</th><th>Prix HT/KG</th><th>Action</th></tr></thead><tbody id="body-mp"></tbody></table>
        <button class="btn" style="background:var(--success)" onclick="addRowMP()">+ Ajouter MP</button>
    </div>

    <div id="tab-labo" class="tab-content">
        <div id="capture-zone">
            <h2>🧪 Composition : <input type="text" placeholder="Nom produit" style="width:40%;"></h2>
            <table><thead><tr><th>Ingrédient</th><th>Qté (g)</th><th>Prix</th><th>Action</th></tr></thead><tbody id="body-recette"></tbody></table>
            <button class="btn" style="background:var(--success)" onclick="addRowRecette()">+ Ingrédient</button>
            <hr style="margin: 30px 0;">

            <div class="section-box">
                <h3>⚖️ Réglages recette</h3>
                <input type="number" id="input-cru" placeholder="Poids 1 pièce cru (g)" oninput="calculerFinance()" style="width:45%">
                <input type="number" id="input-cuit" placeholder="Poids 1 pièce cuit (g)" oninput="calculerFinance()" style="width:45%">
            </div>

            <div class="section-box">
                <h3>💰 Réglages de rentabilité</h3>
                <label><strong>Coeff. Multiplicateur</strong></label><br>
                <input type="number" id="input-coef" value="3.0" step="0.1" oninput="calculerFinance()" style="width:30%"><br>
                <label><strong>Taux Marge (%)</strong></label><br>
                <input type="number" id="input-marge" value="66" oninput="calculerFinance()" style="width:30%"><br>
            </div>
        </div>
        <button class="btn" style="background:#8e44ad" onclick="alert('Archivé')">💾 Archiver</button>
        <button class="btn" style="background:#e67e22" onclick="exportToJPG()">📸 Exporter .JPG</button>
    </div>
    
    <div id="tab-boulange" class="tab-content"><h2>🥖 Boulangerie</h2></div>
    <div id="tab-patis" class="tab-content"><h2>🍰 Pâtisserie</h2></div>
    <div id="tab-viennoiseries" class="tab-content"><h2>🥐 Viennoiserie</h2></div>
    <div id="tab-voyage" class="tab-content"><h2>🧁 Gâteaux de Voyages</h2></div>
    <div id="tab-historique" class="tab-content">
        <h2>📈 Historique</h2>
        <select id="hist-metier" onchange="updateChart()"><option value="Boulangerie">Boulangerie</option><option value="Pâtisserie">Pâtisserie</option></select>
        <canvas id="priceChart" height="100"></canvas>
    </div>
</div>

<script>
    // Navigation fonctionnelle et sécurisée
    function changeTab(target) {
        // Cacher tous les onglets
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        // Désactiver tous les boutons
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        // Activer l'onglet cible
        document.getElementById('tab-' + target).classList.add('active');
        // Activer le bouton cible
        document.getElementById('btn-' + target).classList.add('active');
    }

    // Fonctions MP
    function addRowMP() {
        const row = document.getElementById('body-mp').insertRow();
        row.innerHTML = `<td><div class="chk-grid">
            <label><input type="checkbox"> Boul.</label><label><input type="checkbox"> Pât.</label>
            <label><input type="checkbox"> Vien.</label><label><input type="checkbox"> Voyage</label></div></td>
            <td><input type="text"></td><td><input type="text" class="prod-name"></td><td><input type="number" class="mp-prix"></td>
            <td><button class="btn" style="background:red" onclick="this.parentElement.parentElement.remove()">❌</button></td>`;
    }

    // Fonctions Labo
    function addRowRecette() {
        const row = document.getElementById('body-recette').insertRow();
        row.innerHTML = `<td><input type="text"></td><td><input type="number" class="rec-qte" oninput="calculerFinance()"></td><td><input type="number" class="rec-prix" oninput="calculerFinance()"></td>
        <td><button class="btn" style="background:red" onclick="this.parentElement.parentElement.remove()">❌</button></td>`;
    }

    function calculerFinance() { /* Logique de calcul */ }
    function updateChart() { /* Logique graph */ }
    function sync() { document.getElementById('sync-status').innerHTML = "Synchronisé !"; }
    function exportJSON() { alert("Export JSON"); }
    function importJSON(e) { alert("Import JSON"); }
    function savePriceHistory() { alert("Prix enregistrés"); }
    function exportToJPG() { html2canvas(document.querySelector("#capture-zone")).then(c => { const a = document.createElement('a'); a.download = 'Recette.jpg'; a.href = c.toDataURL(); a.click(); }); }
</script>
</body>
</html>
