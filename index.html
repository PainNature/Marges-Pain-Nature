<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boulangerie Pro - V13.0 (Corrigée)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #d35400; --secondary: #2c3e50; --success: #27ae60; }
        body { font-family: sans-serif; background: #dfe6e9; margin: 0; padding: 10px; color: #333; }
        .nav-tabs { display: flex; gap: 2px; background: #95a5a6; padding: 5px; border-radius: 8px 8px 0 0; }
        .tab-btn { padding: 12px; border: none; background: #34495e; color: white; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: white; color: var(--primary); border-bottom: 3px solid var(--primary); }
        .container { background: white; padding: 20px; border-radius: 0 0 12px 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        input, select { padding: 8px; border: 1px solid #ccc; width: 90%; }
        .btn { padding: 10px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; margin-top: 5px; }
        .finance-card { background: #f8f9fa; padding: 15px; border: 1px solid #dee2e6; border-radius: 8px; }
        .result-box { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .result-card { background: #fff; padding: 10px; border: 2px solid var(--primary); text-align: center; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn" id="btn-tab-mp" onclick="showTab('tab-mp')">Matière première</button>
    <button class="tab-btn" id="btn-tab-labo" onclick="showTab('tab-labo')">Labo</button>
    <button class="tab-btn" id="btn-tab-boulange" onclick="showTab('tab-boulange')">Boulangerie</button>
    <button class="tab-btn" id="btn-tab-patis" onclick="showTab('tab-patis')">Pâtisserie</button>
    <button class="tab-btn" id="btn-tab-voyage" onclick="showTab('tab-voyage')">Voyages</button>
</div>

<div class="container">
    <div id="tab-mp" class="tab-content">
        <h3>Contrôle Cloud</h3>
        <button class="btn" style="background:#2980b9" onclick="forceSync()">🔄 Forcer Synchro</button>
        <button class="btn" style="background:var(--success)" onclick="exportData()">💾 Exporter JSON</button>
        <button class="btn" style="background:var(--secondary)" onclick="document.getElementById('file-input').click()">📂 Importer</button>
        <input type="file" id="file-input" style="display:none" onchange="importData(event)">
        
        <h2>Gestion Matières Premières</h2>
        <table><thead><tr><th>Métier</th><th>Ref</th><th>Prix/kg</th><th>Action</th></tr></thead><tbody id="body-mp"></tbody></table>
        <button class="btn" style="background:var(--success)" onclick="addRowMP()">+ Ajouter MP</button>
    </div>

    <div id="tab-labo" class="tab-content">
        <div id="capture-zone" class="finance-card">
            <h2>🧪 Composition</h2>
            <input type="text" id="recipe-name" placeholder="Nom du produit" style="width:300px;">
            <table><thead><tr><th>Ingrédient</th><th>Qté (g)</th><th>Action</th></tr></thead><tbody id="body-recette"></tbody></table>
            <button class="btn" style="background:var(--success)" onclick="addRowRecette()">+ Ingrédient</button>
            <hr>
            <h3>📊 Pilotage Finance</h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <div><label>Poids Cru (g)</label><input type="number" id="input-cru" oninput="calculerFinance()"></div>
                <div><label>Poids Cuit (g)</label><input type="number" id="input-cuit" oninput="calculerFinance()"></div>
            </div>
            <div class="result-box">
                <div class="result-card"><strong>Coef</strong><br>HT: <span id="res-coef-ht">0</span>€<br>TTC: <span id="res-coef-ttc">0</span>€</div>
                <div class="result-card"><strong>Marge</strong><br>HT: <span id="res-marge-ht">0</span>€<br>TTC: <span id="res-marge-ttc">0</span>€</div>
            </div>
        </div>
        <button class="btn" style="background:#e67e22" onclick="exportToJPG()">📸 Exporter JPG</button>
        <select id="select-archive-dest"><option value="boulange">Boulangerie</option><option value="patis">Pâtisserie</option><option value="voyage">Voyages</option></select>
        <button class="btn" style="background:#9b59b6" onclick="archiverRecette()">💾 Archiver</button>
    </div>

    <div id="tab-boulange" class="tab-content"><h2>🥖 Boulangerie</h2><div class="arch-list"></div></div>
    <div id="tab-patis" class="tab-content"><h2>🍰 Pâtisserie</h2><div class="arch-list"></div></div>
    <div id="tab-voyage" class="tab-content"><h2>🧁 Voyages</h2><div class="arch-list"></div></div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function addRowMP() {
        const row = document.getElementById('body-mp').insertRow();
        row.innerHTML = `<td>
            <select class="mp-metier">
                <option value="Boulangerie">Boulangerie</option>
                <option value="Pâtisserie">Pâtisserie</option>
                <option value="Viennoiserie">Viennoiserie</option>
                <option value="Voyage">Voyage</option>
            </select>
        </td>
        <td><input type="text" class="mp-r"></td>
        <td><input type="number" class="mp-p" oninput="calculerFinance()"></td>
        <td><button class="btn" style="background:red" onclick="this.parentElement.parentElement.remove()">❌</button></td>`;
    }

    function addRowRecette() {
        const row = document.getElementById('body-recette').insertRow();
        const mps = Array.from(document.querySelectorAll('#body-mp tr')).map(tr => 
            `<option value="${tr.querySelector('.mp-p').value}">${tr.querySelector('.mp-r').value} (${tr.querySelector('.mp-metier').value})</option>`).join('');
        row.innerHTML = `<td><select class="rec-sel" onchange="calculerFinance()">${mps}</select></td><td><input type="number" class="rec-qte" oninput="calculerFinance()"></td><td><button class="btn" style="background:red" onclick="this.parentElement.parentElement.remove(); calculerFinance()">❌</button></td>`;
    }

    function calculerFinance() {
        let totalCost = 0, totalWeight = 0;
        document.querySelectorAll('#body-recette tr').forEach(tr => {
            const qte = parseFloat(tr.querySelector('.rec-qte').value) || 0;
            const prix = parseFloat(tr.querySelector('.rec-sel').value) || 0;
            totalCost += (qte / 1000) * prix;
            totalWeight += qte;
        });
        const cru = parseFloat(document.getElementById('input-cru').value) || 0;
        const costUnit = cru > 0 ? ((totalCost / totalWeight) * cru) : 0;
        document.getElementById('res-coef-ht').innerText = (costUnit * 3).toFixed(2);
        document.getElementById('res-coef-ttc').innerText = ((costUnit * 3) * 1.055).toFixed(2);
        document.getElementById('res-marge-ht').innerText = (costUnit * 1.5).toFixed(2);
        document.getElementById('res-marge-ttc').innerText = ((costUnit * 1.5) * 1.055).toFixed(2);
    }

    function archiverRecette() {
        const nom = document.getElementById('recipe-name').value;
        const cat = document.getElementById('select-archive-dest').value;
        let archives = JSON.parse(localStorage.getItem('my_archives') || "[]");
        archives.push({nom, cat, html: document.getElementById('capture-zone').innerHTML});
        localStorage.setItem('my_archives', JSON.stringify(archives));
        alert("Archivé !");
        location.reload();
    }

    function exportToJPG() {
        html2canvas(document.querySelector("#capture-zone")).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Recette.jpg';
            link.href = canvas.toDataURL("image/jpeg");
            link.click();
        });
    }

    function forceSync() { alert("Synchronisation forcée (Data sauvegardée en mémoire locale)."); }

    window.onload = () => showTab('tab-labo');
</script>
</body>
</html>
