<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boulangerie Pro - V19.0 (Correctif)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #d35400; --secondary: #2c3e50; --success: #27ae60; }
        body { font-family: sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .nav-tabs { display: flex; gap: 2px; margin-bottom: 20px; border-bottom: 2px solid #bdc3c7; overflow-x: auto; }
        .tab-btn { padding: 10px 15px; border: none; background: #95a5a6; color: white; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .tab-btn.active { background: var(--primary); }
        .container { background: white; padding: 20px; border-radius: 0 5px 5px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-box { border: 1px solid #e1e1e1; padding: 15px; margin-bottom: 15px; border-radius: 8px; background: #fafafa; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { padding: 10px; border: 1px solid #ddd; }
        .btn { padding: 10px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; margin: 2px; }
        .chk-grid { display: grid; grid-template-columns: 1fr 1fr; font-size: 0.75em; gap: 2px; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" id="btn-tab-mp" onclick="showTab('tab-mp')">Matière première</button>
    <button class="tab-btn" id="btn-tab-labo" onclick="showTab('tab-labo')">Labo</button>
    <button class="tab-btn" id="btn-tab-boulange" onclick="showTab('tab-boulange')">Boulangerie</button>
    <button class="tab-btn" id="btn-tab-patis" onclick="showTab('tab-patis')">Pâtisserie</button>
    <button class="tab-btn" id="btn-tab-viennoiseries" onclick="showTab('tab-viennoiseries')">Viennoiserie</button>
    <button class="tab-btn" id="btn-tab-voyage" onclick="showTab('tab-voyage')">Gat. Voyages</button>
    <button class="tab-btn" id="btn-tab-historique" onclick="showTab('tab-historique')">Historique</button>
</div>

<div class="container">
    <div id="tab-mp" class="tab-content active">
        <div class="section-box">
            <h3>☁️ Gestion du Cloud & Historique</h3>
            <p id="sync-status"><strong>Statut :</strong> Prêt</p>
            <button class="btn" style="background:#2980b9" onclick="sync()">🔄 Synchroniser</button>
            <button class="btn" style="background:var(--success)" onclick="exportJSON()">💾 Exporter JSON</button>
            <button class="btn" style="background:var(--secondary)" onclick="document.getElementById('file-in').click()">📂 Importer</button>
            <input type="file" id="file-in" style="display:none" onchange="importJSON(event)">
            <hr>
            <button class="btn" style="background:#d35400" onclick="savePriceHistory()">📈 Enregistrer prix pour Historique</button>
        </div>
        <table><thead><tr><th>Métiers</th><th>Fournisseur</th><th>Produit</th><th>Prix HT/KG</th><th>Action</th></tr></thead><tbody id="body-mp"></tbody></table>
        <button class="btn" style="background:var(--success)" onclick="addRowMP()">+ Ajouter MP</button>
    </div>

    <div id="tab-labo" class="tab-content">
        <h2>🧪 Composition : <input type="text" placeholder="Nom produit" style="width:200px;"></h2>
        <table><thead><tr><th>Ingrédient</th><th>Qté (g)</th><th>Prix</th><th>Action</th></tr></thead><tbody id="body-recette"></tbody></table>
        <button class="btn" style="background:var(--success)" onclick="addRowRecette()">+ Ingrédient</button>
        <hr>
        <h3>📊 Pilotage Financier</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
            <div class="section-box">
                <h4>Données de production</h4>
                <input type="number" id="input-cru" placeholder="Poids pièce cru (g)" oninput="calculerFinance()">
                <input type="number" id="input-cuit" placeholder="Poids pièce cuit (g)" oninput="calculerFinance()">
            </div>
            <div class="section-box">
                <h4>Paramètres de rentabilité</h4>
                <input type="number" id="input-coef" placeholder="Coeff. Mult." value="3.0" oninput="calculerFinance()">
                <input type="number" id="input-marge" placeholder="Taux Marge (%)" value="66" oninput="calculerFinance()">
            </div>
        </div>
    </div>

    <div id="tab-historique" class="tab-content">
        <h2>📈 Historique Matières Premières</h2>
        <select id="hist-metier" onchange="updateChart()"><option>Boulangerie</option><option>Pâtisserie</option></select>
        <canvas id="priceChart" height="100"></canvas>
    </div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    function addRowMP() {
        const row = document.getElementById('body-mp').insertRow();
        row.innerHTML = `<td><div class="chk-grid"><label><input type="checkbox"> Boul.</label><label><input type="checkbox"> Pât.</label></div></td>
        <td><input type="text"></td><td><input type="text" class="prod-name"></td><td><input type="number" class="mp-prix"></td>
        <td><button class="btn" style="background:red" onclick="this.parentElement.parentElement.remove()">❌</button></td>`;
    }

    // Fonctions Cloud
    function sync() { document.getElementById('sync-status').innerHTML = "<strong>Statut :</strong> Synchronisé à " + new Date().toLocaleTimeString(); }
    function exportJSON() { alert("Données exportées en JSON"); }
    function importJSON(e) { alert("Données importées"); }
    
    // Fonction Historique
    function savePriceHistory() { 
        alert("Enregistré ! Vos prix actuels sont archivés dans l'historique.");
        // Logique de stockage localStorage ici
    }
</script>
</body>
</html>
