<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boulangerie Pro - V5.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #d35400; --secondary: #2c3e50; --success: #27ae60; --light: #ecf0f1; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #dfe6e9; margin: 0; padding: 10px; color: #333; }
        
        .nav-tabs { display: flex; gap: 2px; background: #95a5a6; padding: 5px; border-radius: 8px 8px 0 0; overflow-x: auto; }
        .tab-btn { padding: 12px 15px; border: none; background: #34495e; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; min-height: 44px; white-space: nowrap; }
        .tab-btn.active { background: white; color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .container { background: white; padding: 15px; border-radius: 0 0 12px 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .grid-labo { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .grid-labo { grid-template-columns: 1fr; } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--light); padding: 10px; text-align: left; }
        td { padding: 10px; border: 1px solid #eee; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 90%; }
        
        .btn { padding: 12px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; min-height: 44px; margin-top: 5px; }
        .stat-card { background: #f4f7f6; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); }
        .archive-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #fff; }
        .choice-box { background: #eef2f3; padding: 8px; border-radius: 6px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn" id="btn-tab-mp" onclick="showTab('tab-mp')">📦 Stocks</button>
    <button class="tab-btn" id="btn-tab-labo" onclick="showTab('tab-labo')">🧪 Labo</button>
    <button class="tab-btn" id="btn-tab-boulange" onclick="showTab('tab-fixe-boulange')">🥖 Boulange</button>
    <button class="tab-btn" id="btn-tab-patis" onclick="showTab('tab-fixe-patis')">🍰 Pâtis</button>
    <button class="tab-btn" id="btn-tab-viennoiseries" onclick="showTab('tab-fixe-viennoiseries')">🥐 Viennoiseries</button>
    <button class="tab-btn" id="btn-tab-voyage" onclick="showTab('tab-fixe-voyage')">🧁 Voyage</button>
</div>

<div class="container">
    <div id="tab-mp" class="tab-content">
        <h2>Matières Premières</h2>
        <table id="table-mp"><thead><tr><th>Fournisseur</th><th>Ref</th><th>Prix/kg</th><th>Métiers</th><th>Action</th></tr></thead><tbody id="body-mp"></tbody></table>
        <button class="btn" style="background:var(--success)" onclick="addRowMP()">+ Ajouter MP</button>
    </div>

    <div id="tab-labo" class="tab-content">
        <div id="capture-zone" class="grid-labo">
            <div>
                <h2>🧪 Composition</h2>
                <input type="text" id="recipe-name" placeholder="Nom du produit" style="width:90%; margin-bottom:10px; font-weight:bold;">
                <select id="select-metier-recette" onchange="updateRecipeDrops()" style="width:95%; margin-bottom:10px;">
                    <option value="boulange">Boulangerie</option><option value="patis">Pâtisserie</option>
                    <option value="viennoiseries">Viennoiseries</option><option value="voyage">Voyage</option>
                </select>
                <table>
                    <thead><tr><th>Ingrédient</th><th>Qté (g)</th><th>Action</th></tr></thead>
                    <tbody id="body-recette"></tbody>
                </table>
                <button class="btn" style="background:var(--success)" onclick="addRowRecette()">+ Ingrédient</button>
            </div>
            
            <div class="stat-card">
                <h3>📊 Pilotage Finance</h3>
                <label>Pièce Cru (g) :</label><input type="number" id="input-cru-piece" oninput="calculerRecette()">
                <p>Coût unitaire : <strong><span id="res-cout-unit">0.00</span>€</strong></p>
                
                <div class="choice-box">
                    <input type="radio" name="method" value="coef" id="use-coef" checked>
                    <label for="use-coef"><strong>Coef Multiplicateur :</strong></label>
                    <input type="number" id="input-coef" value="3.0" step="0.1" oninput="calculerRecette()" style="width:50px">
                    <p>PV TTC : <strong id="res-pvttc-coef" style="color:var(--primary)">0.00</strong>€</p>
                </div>

                <div class="choice-box">
                    <input type="radio" name="method" value="marge" id="use-marge">
                    <label for="use-marge"><strong>Marge Brute (%) :</strong></label>
                    <input type="number" id="input-marge" value="66" step="1" oninput="calculerRecette()" style="width:50px">
                    <p>PV TTC : <strong id="res-pvttc-marge" style="color:var(--success)">0.00</strong>€</p>
                </div>
                
                <hr>
                <label>Archiver dans :</label>
                <select id="select-archive-metier">
                    <option value="boulange">Boulangerie</option><option value="patis">Pâtisserie</option>
                    <option value="viennoiseries">Viennoiseries</option><option value="voyage">Voyage</option>
                </select>
                <button class="btn" style="background:var(--secondary); width:100%" onclick="archiverRecette()">💾 Archiver sélectionné</button>
                <button class="btn" style="background:#3498db; width:100%" onclick="exportJPEG()">📸 Exporter JPEG</button>
            </div>
        </div>
    </div>
    
    <div id="tab-fixe-boulange" class="tab-content"><h2>🥖 Archives Boulangerie</h2><div id="arch-boulange"></div></div>
    <div id="tab-fixe-patis" class="tab-content"><h2>🍰 Archives Pâtisserie</h2><div id="arch-patis"></div></div>
    <div id="tab-fixe-viennoiseries" class="tab-content"><h2>🥐 Archives Viennoiseries</h2><div id="arch-viennoiseries"></div></div>
    <div id="tab-fixe-voyage" class="tab-content"><h2>🧁 Archives Voyage</h2><div id="arch-voyage"></div></div>
</div>

<script>
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
        localStorage.setItem('active_tab', id);
    }

    function addRowMP(data = {f:"", r:"", p:"", tags:[]}) {
        const row = document.getElementById('body-mp').insertRow();
        const tags = ["boulange", "patis", "viennoiseries", "voyage"];
        const chk = tags.map(t => `<label style="font-size:10px"><input type="checkbox" class="mp-tag" value="${t}" ${data.tags.includes(t)?'checked':''}> ${t[0].toUpperCase()}</label>`).join('');
        row.innerHTML = `<td><input type="text" class="mp-fourn" value="${data.f}" onchange="saveMP()"></td>
                         <td><input type="text" class="mp-ref" value="${data.r}" onchange="saveMP()"></td>
                         <td><input type="number" class="mp-prix" value="${data.p}" onchange="saveMP()"></td>
                         <td>${chk}</td>
                         <td><button class="btn" style="padding:5px; background:var(--primary)" onclick="this.parentElement.parentElement.remove(); saveMP()">❌</button></td>`;
    }

    function saveMP() {
        const data = [];
        document.querySelectorAll('#body-mp tr').forEach(tr => {
            const f = tr.querySelector('.mp-fourn').value;
            const r = tr.querySelector('.mp-ref').value;
            if(!r) return;
            const p = tr.querySelector('.mp-prix').value;
            const tags = Array.from(tr.querySelectorAll('.mp-tag:checked')).map(c => c.value);
            data.push({f, r, p, tags});
        });
        localStorage.setItem('data_mp', JSON.stringify(data));
        updateRecipeDrops();
    }

    function addRowRecette() {
        const row = document.getElementById('body-recette').insertRow();
        row.innerHTML = `<td><select class="rec-select" onchange="calculerRecette()"></select></td>
                         <td><input type="number" class="rec-qte" oninput="calculerRecette()"></td>
                         <td><button class="btn" style="padding:5px; background:var(--primary)" onclick="this.parentElement.parentElement.remove(); calculerRecette()">❌</button></td>`;
        updateRecipeDrops();
    }

    function updateRecipeDrops() {
        const metier = document.getElementById('select-metier-recette').value;
        const mp = JSON.parse(localStorage.getItem('data_mp') || '[]');
        const filtered = mp.filter(i => i.tags.length === 0 || i.tags.includes(metier));
        let opts = '<option value="">--Ingrédient--</option>';
        filtered.forEach(i => opts += `<option value="${i.p}">${i.r}</option>`);
        document.querySelectorAll('.rec-select').forEach(s => { const old = s.value; s.innerHTML = opts; s.value = old; });
    }

    function calculerRecette() {
        let coutTotal = 0, totalCru = 0;
        document.querySelectorAll('#body-recette tr').forEach(tr => {
            const qte = parseFloat(tr.querySelector('.rec-qte').value) || 0;
            const prix = parseFloat(tr.querySelector('.rec-select').value) || 0;
            coutTotal += (qte / 1000) * prix;
            totalCru += qte;
        });
        
        const cruPiece = parseFloat(document.getElementById('input-cru-piece').value) || 0;
        const unitCost = (cruPiece > 0) ? (coutTotal / (totalCru / cruPiece)) : 0;
        
        document.getElementById('res-cout-unit').innerText = unitCost.toFixed(2);
        document.getElementById('res-pvttc-coef').innerText = (unitCost * parseFloat(document.getElementById('input-coef').value) * 1.055).toFixed(2);
        document.getElementById('res-pvttc-marge').innerText = (unitCost / (1 - (parseFloat(document.getElementById('input-marge').value)/100)) * 1.055).toFixed(2);
    }

    function archiverRecette() {
        const nom = document.getElementById('recipe-name').value || "Recette";
        const metier = document.getElementById('select-archive-metier').value;
        const method = document.querySelector('input[name="method"]:checked').value;
        const pv = (method === 'coef') ? document.getElementById('res-pvttc-coef').innerText : document.getElementById('res-pvttc-marge').innerText;
        
        const archives = JSON.parse(localStorage.getItem('archives') || '[]');
        archives.push({ nom, cout: document.getElementById('res-cout-unit').innerText, pv, metier, date: new Date().toLocaleDateString() });
        localStorage.setItem('archives', JSON.stringify(archives));
        alert("Archivé avec prix basé sur : " + method.toUpperCase());
        renderArchives();
    }

    function renderArchives() {
        const archives = JSON.parse(localStorage.getItem('archives') || '[]');
        ['boulange', 'patis', 'viennoiseries', 'voyage'].forEach(m => {
            document.getElementById('arch-' + m).innerHTML = archives.filter(a => a.metier === m).map(a => 
                `<div class="archive-card"><strong>${a.nom}</strong><br>Coût: ${a.cout}€ | PV: ${a.pv}€ <small>(${a.date})</small></div>`
            ).join('');
        });
    }

    function exportJPEG() {
        html2canvas(document.querySelector("#capture-zone")).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Fiche_Recette.jpg';
            link.href = canvas.toDataURL("image/jpeg");
            link.click();
        });
    }

    window.onload = () => {
        JSON.parse(localStorage.getItem('data_mp') || '[]').forEach(m => addRowMP(m));
        renderArchives();
        showTab(localStorage.getItem('active_tab') || 'tab-labo');
        updateRecipeDrops();
    };
</script>
</body>
</html>
