<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boulangerie Pro - Gestion Cru/Cuit V3.0</title>
    <style>
        :root { --primary: #d35400; --secondary: #2c3e50; --success: #27ae60; --danger: #e74c3c; --light: #f4f7f6; }
        body { font-family: sans-serif; background: #dfe6e9; padding: 10px; color: var(--secondary); }
        .nav-tabs { display: flex; gap: 5px; background: var(--secondary); padding: 10px; border-radius: 8px 8px 0 0; }
        .tab-btn { padding: 10px; border: none; background: rgba(255,255,255,0.1); color: white; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .tab-btn.active { background: var(--primary); }
        .container { background: white; padding: 20px; border-radius: 0 0 12px 12px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .calc-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .calc-panel { background: #fdfdfd; padding: 20px; border-radius: 8px; border: 2px solid #ddd; }
        .stat-box { font-size: 1.1em; margin: 10px 0; padding: 10px; background: var(--light); border-radius: 5px; }
        .highlight { color: var(--primary); font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--light); text-align: left; padding: 10px; }
        td { padding: 8px; border: 1px solid #eee; }
        input, select { width: 90%; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 10px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showTab('tab-mp')">📦 Stocks</button>
        <button class="tab-btn" onclick="showTab('tab-labo')">🧪 Labo</button>
        <button class="tab-btn" onclick="showTab('tab-fixe-boulange')">🥖 Boulange</button>
        </div>

    <div class="container">
        <div id="tab-labo" class="tab-content active">
            <div class="calc-grid">
                <div>
                    <h2>🧪 Composition</h2>
                    <table id="table-recette">
                        <thead><tr><th>Ingrédient</th><th>Qté (g)</th><th>Action</th></tr></thead>
                        <tbody id="body-recette"></tbody>
                    </table>
                    <button class="btn" style="background:var(--success); margin-top:10px;" onclick="addRowRecette()">+ Ingrédient</button>
                </div>
                
                <div class="calc-panel">
                    <h3>📊 Bilan Cru vs Cuit</h3>
                    <p>Poids Cru Total : <strong id="res-cru">0</strong>g</p>
                    
                    <label>Poids Cuit (sorti four) :</label>
                    <input type="number" id="poids-cuit" oninput="calculerRecette()" placeholder="g">
                    
                    <div class="stat-box">
                        Perte évaporation : <span id="res-perte" class="highlight">0%</span>
                    </div>

                    <hr>
                    <label>Coef. Multiplicateur :</label>
                    <input type="number" id="cfg-coef" value="4.0" step="0.1" oninput="calculerRecette()">
                    
                    <div class="stat-box">
                        Coût réel (Cuit) : <span id="res-cout-cuit" class="highlight">0.00</span>€<br>
                        Prix Vente TTC : <span id="res-pv" class="highlight" style="font-size:1.5em">0.00</span>€
                    </div>
                </div>
            </div>
        </div>
        </div>

<script>
    function calculerRecette() {
        let coutTotal = 0, cruTotal = 0;
        
        document.querySelectorAll('#body-recette tr').forEach(tr => {
            const select = tr.querySelector('.rec-select');
            const qte = parseFloat(tr.querySelector('.rec-qte').value) || 0;
            const prixKg = parseFloat(select.value) || 0;
            
            coutTotal += (qte / 1000) * prixKg;
            cruTotal += qte;
        });

        // Gestion Cuit
        const cuitTotal = parseFloat(document.getElementById('poids-cuit').value) || cruTotal;
        const perte = ((cruTotal - cuitTotal) / cruTotal) * 100;
        
        // Coût réel rapporté au poids cuit (ou poids cru si aucune saisie)
        const coutAuCuit = (cuitTotal > 0) ? (coutTotal / (cuitTotal / 1000)) : coutTotal;
        
        // Calcul Final
        const coef = parseFloat(document.getElementById('cfg-coef').value) || 1;
        const tva = 1.055; // Fixe ou variable
        const pvTTC = (coutTotal * coef) * tva;

        document.getElementById('res-cru').innerText = cruTotal;
        document.getElementById('res-perte').innerText = perte.toFixed(1) + "%";
        document.getElementById('res-cout-cuit').innerText = (coutTotal / (cuitTotal/1000)).toFixed(2) + "€/kg";
        document.getElementById('res-pv').innerText = pvTTC.toFixed(2);
    }
    
    // ... (Gardez le reste des fonctions addRow, syncData, etc.)
</script>
</body>
</html>
