<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boulangerie Pro - V5.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #d35400; --secondary: #2c3e50; --success: #27ae60; --light: #ecf0f1; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #dfe6e9; margin: 0; padding: 10px; color: #333; }
        
        /* Navigation */
        .nav-tabs { display: flex; gap: 2px; background: #95a5a6; padding: 5px; border-radius: 8px 8px 0 0; overflow-x: auto; }
        .tab-btn { padding: 12px 15px; border: none; background: #34495e; color: white; cursor: pointer; border-radius: 4px; font-weight: bold; min-height: 44px; white-space: nowrap; }
        .tab-btn:hover { background: #455a64; }
        .tab-btn.active { background: white; color: var(--primary); border-bottom: 3px solid var(--primary); }
        
        .container { background: white; padding: 15px; border-radius: 0 0 12px 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Layout */
        .grid-labo { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        @media (max-width: 900px) { .grid-labo { grid-template-columns: 1fr; } }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--light); padding: 10px; text-align: left; }
        td { padding: 10px; border: 1px solid #eee; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; width: 90%; }
        
        .btn { padding: 12px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; min-height: 44px; margin-top: 5px; }
        .stat-card { background: #f4f7f6; padding: 15px; border-radius: 8px; border-left: 5px solid var(--primary); }
        
        /* Archive Card Style */
        .archive-card { border: 1px solid #ddd; padding: 10px; margin-bottom: 10px; border-radius: 8px; background: #fff; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn" id="btn-tab-mp" onclick="showTab('tab-mp')">📦 Stocks</button>
    <button class="tab-btn" id="btn-tab-labo" onclick="showTab('tab-labo')">🧪 Labo</button>
    <button class="tab-btn" id="btn-tab-boulange" onclick="showTab('tab-fixe-boulange')">🥖 Boulange</button>
    <button class="tab-btn" id="btn-tab-patis" onclick="showTab('tab-fixe-patis')">🍰 Pâtis</button>
    <button class="tab-btn" id="btn-tab-viennoiseries" onclick="showTab('tab-fixe-viennoiseries')">🥐 Viennoiseries</button>
    <button class="tab-btn" id="btn-tab-voyage" onclick="showTab('tab-fixe-voyage')">🧁 Voyage</button>
</div>

<div class="container">
    <div id="tab-mp" class="tab-content">
        <h2>Matières Premières</h2>
        <table id="table-mp"><thead><tr><th>Fournisseur</th><th>Ref</th><th>Prix/kg</th><th>Action</th></tr></thead><tbody id="body-mp"></tbody></table>
        <button class="btn" style="background:var(--success)" onclick="addRowMP()">+ Ajouter MP</button>
    </div>

    <div id="tab-labo" class="tab-content">
        <div id="capture-zone" class="grid-labo">
            <div>
                <h2>🧪 Composition</h2>
                <input type="text" id="recipe-name" placeholder="Nom de la recette" style="width:95%; margin-bottom:10px; font-weight:bold;">
                <table>
                    <thead><tr><th>Ingrédient</th><th>Qté (g)</th><th>Action</th></tr></thead>
                    <tbody id="body-recette"></tbody>
                </table>
                <button class="btn" style="background:var(--success)" onclick="addRowRecette()">+ Ingrédient</button>
            </div>
            
            <div class="stat-card">
                <h3>📊 Finance & Export</h3>
                <label>Pièce Cru (g) :</label><input type="number" id="input-cru-piece" oninput="calculerRecette()">
                <label>Pièce Cuit (g) :</label><input type="number" id="input-cuit-piece" oninput="calculerRecette()">
                <hr>
                <p>PV TTC Coef: <strong id="res-pvttc-coef" style="color:var(--primary)">0.00</strong>€</p>
                <p>PV TTC Marge: <strong id="res-pvttc-marge" style="color:var(--success)">0.00</strong>€</p>
                
                <hr>
                <label>Archiver dans :</label>
                <select id="select-archive-metier">
                    <option value="boulange">Boulangerie</option><option value="patis">Pâtisserie</option>
                    <option value="viennoiseries">Viennoiseries</option><option value="voyage">Voyage</option>
                </select>
                <button class="btn" style="background:var(--secondary); width:100%" onclick="archiverRecette()">💾 Archiver</button>
                <button class="btn" style="background:#3498db; width:100%" onclick="exportJPEG()">📸 Exporter JPEG</button>
            </div>
        </div>
    </div>
    
    <div id="tab-fixe-boulange" class="tab-content"><h2>🥖 Archives Boulangerie</h2><div id="arch-boulange"></div></div>
    <div id="tab-fixe-patis" class="tab-content"><h2>🍰 Archives Pâtisserie</h2><div id="arch-patis"></div></div>
    <div id="tab-fixe-viennoiseries" class="tab-content"><h2>🥐 Archives Viennoiseries</h2><div id="arch-viennoiseries"></div></div>
    <div id="tab-fixe-voyage" class="tab-content"><h2>🧁 Archives Voyage</h2><div id="arch-voyage"></div></div>
</div>

<script>
    // --- FONCTIONS CORE ---
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    // --- ARCHIVAGE ---
    function archiverRecette() {
        const nom = document.getElementById('recipe-name').value || "Sans Nom";
        const metier = document.getElementById('select-archive-metier').value;
        const data = {
            nom: nom,
            cout: document.getElementById('res-cout-unit').innerText,
            pv: document.getElementById('res-pvttc-coef').innerText
        };
        
        let archives = JSON.parse(localStorage.getItem('archives') || '[]');
        archives.push({ ...data, metier: metier, date: new Date().toLocaleDateString() });
        localStorage.setItem('archives', JSON.stringify(archives));
        alert("Archivé avec succès dans " + metier);
        renderArchives();
    }

    function renderArchives() {
        const archives = JSON.parse(localStorage.getItem('archives') || '[]');
        ['boulange', 'patis', 'viennoiseries', 'voyage'].forEach(m => {
            const container = document.getElementById('arch-' + m);
            container.innerHTML = archives.filter(a => a.metier === m).map(a => 
                `<div class="archive-card"><strong>${a.nom}</strong><br>Coût: ${a.cout}€ | PV: ${a.pv}€ <small>(${a.date})</small></div>`
            ).join('');
        });
    }

    // --- EXPORT JPEG ---
    function exportJPEG() {
        html2canvas(document.querySelector("#capture-zone")).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Fiche_Recette.jpg';
            link.href = canvas.toDataURL("image/jpeg");
            link.click();
        });
    }

    // --- CALCULS (Simplifiés pour V5.2) ---
    function calculerRecette() {
        let coutTotal = 0;
        document.querySelectorAll('#body-recette tr').forEach(tr => {
            const qte = parseFloat(tr.querySelector('.rec-qte').value) || 0;
            const prix = parseFloat(tr.querySelector('.rec-select').value) || 0;
            coutTotal += (qte / 1000) * prix;
        });
        document.getElementById('res-cout-unit').innerText = coutTotal.toFixed(2);
        document.getElementById('res-pvttc-coef').innerText = (coutTotal * 3 * 1.055).toFixed(2);
        document.getElementById('res-pvttc-marge').innerText = (coutTotal / (1 - 0.66) * 1.055).toFixed(2);
    }

    // --- INITIALISATION ---
    window.onload = () => {
        renderArchives();
        showTab('tab-labo');
    };
    
    // ... [Reste des fonctions addRowMP/Recette identiques à V5.1]
</script>
</body>
</html>
