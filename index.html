<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boulangerie Pro - V14.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #d35400; --secondary: #2c3e50; --success: #27ae60; --light: #ecf0f1; }
        body { font-family: sans-serif; background: #dfe6e9; margin: 0; padding: 20px; color: #333; }
        
        /* Navigation */
        .nav-tabs { display: flex; gap: 5px; margin-bottom: 20px; }
        .tab-btn { padding: 12px 20px; border: none; background: #95a5a6; color: white; cursor: pointer; font-weight: bold; border-radius: 5px 5px 0 0; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        .container { background: white; padding: 20px; border-radius: 0 5px 5px 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Tables & Inputs */
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 90%; }
        .btn { padding: 10px 15px; border: none; cursor: pointer; color: white; border-radius: 4px; font-weight: bold; margin: 5px; }

        /* Sections */
        .cloud-panel { background: #e8f8f5; padding: 15px; border: 2px dashed var(--success); border-radius: 8px; margin-bottom: 20px; }
        .finance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .result-box { display: flex; gap: 10px; margin-top: 10px; }
        .result-card { background: #fdfdfd; padding: 10px; border: 2px solid var(--primary); border-radius: 6px; flex: 1; }
    </style>
</head>
<body>

<div class="nav-tabs">
    <button class="tab-btn active" id="btn-tab-mp" onclick="showTab('tab-mp')">Matière première</button>
    <button class="tab-btn" id="btn-tab-labo" onclick="showTab('tab-labo')">Labo</button>
    <button class="tab-btn" id="btn-tab-boulange" onclick="showTab('tab-boulange')">Boulangerie</button>
    <button class="tab-btn" id="btn-tab-patis" onclick="showTab('tab-patis')">Pâtisserie</button>
    <button class="tab-btn" id="btn-tab-voyage" onclick="showTab('tab-voyage')">Voyages</button>
</div>

<div class="container">
    <div id="tab-mp" class="tab-content active">
        <div class="cloud-panel">
            <h3>☁️ Gestion du Cloud</h3>
            <p id="sync-status">Statut : En attente...</p>
            <button class="btn" style="background:#2980b9" onclick="forceSync()">🔄 Synchroniser</button>
            <button class="btn" style="background:var(--success)" onclick="exportJSON()">💾 Exporter JSON</button>
            <button class="btn" style="background:var(--secondary)" onclick="document.getElementById('file-input').click()">📂 Importer</button>
            <input type="file" id="file-input" style="display:none" onchange="importJSON(event)">
        </div>
        
        <h2>Gestion matière première</h2>
        <table><thead><tr><th>Métier</th><th>Fournisseur</th><th>Produit</th><th>Prix HT/KG</th><th>Action</th></tr></thead><tbody id="body-mp"></tbody></table>
        <button class="btn" style="background:var(--success)" onclick="addRowMP()">+ Ajouter MP</button>
    </div>

    <div id="tab-labo" class="tab-content">
        <div id="capture-zone">
            <h2>🧪 Composition</h2>
            <input type="text" id="recipe-name" placeholder="Nom du produit" style="width:90%;">
            <table><thead><tr><th>Ingrédient</th><th>Qté (g)</th><th>Prix Calculé</th><th>Action</th></tr></thead><tbody id="body-recette"></tbody></table>
            <button class="btn" style="background:var(--success)" onclick="addRowRecette()">+ Ingrédient</button>

            <h3>📊 Pilotage financier</h3>
            <p><strong>Total pâte crue :</strong> <span id="res-total-raw">0</span>g</p>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <input type="number" id="input-cru" placeholder="Poids 1 pièce cru (g)" oninput="calculerFinance()">
                <input type="number" id="input-cuit" placeholder="Poids 1 pièce cuit (g)" oninput="calculerFinance()">
                <input type="number" id="input-coef" placeholder="Coeff. Multiplicateur" value="3.0" step="0.1" oninput="calculerFinance()">
                <input type="number" id="input-marge" placeholder="Taux Marge (%)" value="66" oninput="calculerFinance()">
                <input type="number" id="input-emb" placeholder="Emballage TTC (€)" oninput="calculerFinance()">
            </div>
            
            <div class="result-box">
                <div class="result-card"><strong>Coeff.</strong><br>HT: <span id="res-c-ht">0</span>€<br>TTC: <span id="res-c-ttc">0</span>€</div>
                <div class="result-card"><strong>Marge</strong><br>HT: <span id="res-m-ht">0</span>€<br>TTC: <span id="res-m-ttc">0</span>€</div>
            </div>
        </div>
        <hr>
        <select id="select-archive-dest">
            <option value="boulange">Boulangerie</option>
            <option value="patis">Pâtisserie</option>
            <option value="voyage">Voyages</option>
        </select>
        <button class="btn" style="background:#8e44ad" onclick="archiverRecette()">💾 Archiver</button>
        <button class="btn" style="background:#e67e22" onclick="exportToJPG()">📸 Exporter .JPG</button>
    </div>

    <div id="tab-boulange" class="tab-content"><h2>🥖 Boulangerie</h2><div class="arch-list"></div></div>
    <div id="tab-patis" class="tab-content"><h2>🍰 Pâtisserie</h2><div class="arch-list"></div></div>
    <div id="tab-voyage" class="tab-content"><h2>🧁 Voyages</h2><div class="arch-list"></div></div>
</div>

<script>
    // Tab Navigation
    function showTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('btn-' + id).classList.add('active');
    }

    // Logic Functions
    function addRowMP() {
        const row = document.getElementById('body-mp').insertRow();
        row.innerHTML = `<td><select class="mp-metier"><option>Boulangerie</option><option>Pâtisserie</option><option>Voyages</option></select></td>
        <td><input type="text" class="mp-f"></td><td><input type="text" class="mp-p"></td><td><input type="number" class="mp-prix" oninput="calculerFinance()"></td>
        <td><button class="btn" style="background:red" onclick="this.parentElement.parentElement.remove()">❌</button></td>`;
    }

    function addRowRecette() {
        const row = document.getElementById('body-recette').insertRow();
        const mps = Array.from(document.querySelectorAll('#body-mp tr')).map(tr => 
            `<option value="${tr.querySelector('.mp-prix').value}">${tr.querySelector('.mp-p').value}</option>`).join('');
        row.innerHTML = `<td><select class="rec-sel" onchange="calculerFinance()">${mps}</select></td>
        <td><input type="number" class="rec-qte" oninput="calculerFinance()"></td>
        <td class="rec-calc">0€</td>
        <td><button class="btn" style="background:red" onclick="this.parentElement.parentElement.remove(); calculerFinance()">❌</button></td>`;
    }

    function calculerFinance() {
        let totalCost = 0, totalWeight = 0;
        document.querySelectorAll('#body-recette tr').forEach(tr => {
            const qte = parseFloat(tr.querySelector('.rec-qte').value) || 0;
            const prix = parseFloat(tr.querySelector('.rec-sel').value) || 0;
            const lineCost = (qte / 1000) * prix;
            tr.querySelector('.rec-calc').innerText = lineCost.toFixed(2) + '€';
            totalCost += lineCost;
            totalWeight += qte;
        });
        document.getElementById('res-total-raw').innerText = totalWeight;

        const cru = parseFloat(document.getElementById('input-cru').value) || 1;
        const unitCost = (totalCost / totalWeight) * cru;
        const coef = parseFloat(document.getElementById('input-coef').value) || 0;
        const marge = parseFloat(document.getElementById('input-marge').value) || 0;
        const emb = parseFloat(document.getElementById('input-emb').value) || 0;

        // Coeff Method
        const cHT = unitCost * coef;
        document.getElementById('res-c-ht').innerText = cHT.toFixed(2);
        document.getElementById('res-c-ttc').innerText = ((cHT * 1.055) + emb).toFixed(2);

        // Marge Method
        const mHT = unitCost / (1 - (marge / 100));
        document.getElementById('res-m-ht').innerText = isFinite(mHT) ? mHT.toFixed(2) : "0";
        document.getElementById('res-m-ttc').innerText = isFinite(mHT) ? ((mHT * 1.055) + emb).toFixed(2) : "0";
    }

    // Cloud & Export
    function forceSync() { document.getElementById('sync-status').innerText = "Statut : Synchronisé (" + new Date().toLocaleTimeString() + ")"; }
    
    function exportToJPG() {
        html2canvas(document.querySelector("#capture-zone")).then(canvas => {
            const link = document.createElement('a');
            link.download = 'Recette.jpg';
            link.href = canvas.toDataURL("image/jpeg");
            link.click();
        });
    }

    function archiverRecette() {
        const cat = document.getElementById('select-archive-dest').value;
        const nom = document.getElementById('recipe-name').value;
        alert("Archivé dans " + cat + " : " + nom);
    }

    // Export JSON
    function exportJSON() { alert("Export JSON simulé"); }
    function importJSON(e) { alert("Import JSON activé"); }
</script>
</body>
</html>
